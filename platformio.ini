; PlatformIO Project Configuration File
; Soccer Robot - ESP32 + Bluepad32

[env:esp32dev]
platform = espressif32@6.5.0
board = esp32dev
framework = arduino
monitor_speed = 115200

; bluepad32 needs its own custom arduino core, can't just use lib_deps
; this replaces the default ESP32 arduino framework with the bluepad32-enabled one
; using local symlink to avoid Windows path-length issues with PlatformIO's hashed dir names
; pinned platform to 6.5.0 — its toolchain is compatible with bluepad32's ESP-IDF 4.4 SDK
platform_packages =
    framework-arduinoespressif32 @ symlink://C:\Users\noureldeen\.platformio\packages\bp32

; only allow one controller at a time
build_flags =
    -D CONFIG_BLUEPAD32_MAX_DEVICES=1
test_ignore = *

; motor test build (no bluetooth needed)
; flash: pio run -e test_motors -t upload
; monitor: pio device monitor -e test_motors
[env:test_motors]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
test_ignore = *

; only compile the test file and motors, skip everything else
build_src_filter =
    -<*>
    +<../test/test_motors.cpp>
    +<motors.cpp>
