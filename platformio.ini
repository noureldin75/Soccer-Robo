; PlatformIO Project Configuration File
; Soccer Robot - ESP32 + ESPiX WiFi controller

[env:esp32dev]
platform = espressif32@6.5.0
board = esp32dev
framework = arduino
monitor_speed = 115200
; WiFi and WebServer are built into the ESP32 Arduino core, no extra libs needed

; motor test build (no bluetooth/wifi needed)
; flash: pio run -e test_motors -t upload
; monitor: pio device monitor -e test_motors
[env:test_motors]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
test_ignore = *

build_src_filter =
    -<*>
    +<../test/test_motors.cpp>
    +<motors.cpp>